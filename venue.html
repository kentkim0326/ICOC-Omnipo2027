<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICOC 경기장 — Brain Sports Omnipo 2027</title>
<link rel="icon" href="assets/favicon-32.png" type="image/png" sizes="32x32">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<!-- Mapbox GL JS (primary) -->
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<!-- MapLibre GL JS (fallback) -->
<link href="https://cdn.jsdelivr.net/npm/maplibre-gl@4/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/maplibre-gl@4/dist/maplibre-gl.js"></script>
<style>
:root {
  --navy:#0B1F3A; --navy2:#0e2847; --gold:#C9A84C; --gold-l:#E8C97A;
  --cream:#F5F0E8; --glass:rgba(11,31,58,0.88); --glass2:rgba(10,26,52,0.97);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Noto Sans KR',sans-serif;background:var(--navy);}

/* ── MAP ── */
#map{position:fixed;inset:0;width:100vw;height:100vh;z-index:0;}

/* ── TOP BAR ── */
.top-bar{
  position:fixed;top:0;left:0;right:0;height:56px;
  display:flex;align-items:center;gap:10px;padding:0 16px;
  background:var(--glass);backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(201,168,76,0.18);z-index:100;
}
.btn-back{
  display:flex;align-items:center;gap:5px;padding:6px 14px;
  border:1px solid rgba(201,168,76,0.3);border-radius:24px;
  background:rgba(201,168,76,0.07);color:var(--gold-l);
  font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;
  transition:all .2s;white-space:nowrap;
}
.btn-back:hover{background:rgba(201,168,76,0.16);border-color:var(--gold);}
.top-venue-name{flex:1;min-width:0;font-size:15px;font-weight:700;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.top-type-badge{font-size:11px;font-weight:600;color:var(--gold);padding:3px 10px;border:1px solid rgba(201,168,76,0.28);border-radius:12px;white-space:nowrap;}

/* ── FLOATING BUTTONS (right side) ── */
.float-btns{
  position:fixed;right:14px;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;gap:10px;z-index:90;
}
.float-btn{
  width:44px;height:44px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:var(--glass);border:1px solid rgba(201,168,76,0.28);
  cursor:pointer;font-size:18px;backdrop-filter:blur(12px);
  transition:all .2s;color:var(--cream);
}
.float-btn:hover{background:rgba(201,168,76,0.18);border-color:var(--gold);}

/* ── BOTTOM SHEET ── */
.bottom-sheet{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  transition:transform .4s cubic-bezier(.32,.72,0,1);
  max-height:55vh; /* sheet 전체 최대 높이 */
  display:flex;flex-direction:column;
}
.sheet-handle-area{
  width:100%;display:flex;justify-content:center;
  padding:8px 0 0;cursor:pointer;flex-shrink:0;
}
.sheet-handle{width:36px;height:4px;background:rgba(201,168,76,0.35);border-radius:2px;}
.sheet-body{
  background:var(--glass2);backdrop-filter:blur(24px);
  border-top:1px solid rgba(201,168,76,0.2);
  padding:0 16px 10px;
  display:flex;flex-direction:column;flex:1;overflow:hidden;
}
/* 스크롤 영역 - 최대 높이 제한 */
.sheet-scroll{
  overflow-y:auto;flex:1;
  max-height:calc(55vh - 130px); /* action-row 높이 제외 */
}
.sheet-scroll::-webkit-scrollbar{width:3px;}
.sheet-scroll::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.25);border-radius:2px;}

/* 모바일: 더 작게 */
@media(max-width:640px){
  .bottom-sheet{ max-height:48vh; }
  .sheet-scroll{ max-height:calc(48vh - 120px); }
}
/* 접힌 상태 */
.bottom-sheet.collapsed .sheet-scroll{ max-height:0;overflow:hidden; }
.bottom-sheet.collapsed .sheet-expand-hint{ display:block; }
.sheet-expand-hint{ display:none;text-align:center;font-size:11px;color:rgba(201,168,76,0.5);padding:4px 0 8px; }

/* venue header */
.venue-header{
  display:flex;align-items:center;gap:12px;
  padding:10px 0 10px;border-bottom:1px solid rgba(201,168,76,0.1);
}
.venue-icon-box{
  width:52px;height:52px;flex-shrink:0;border-radius:14px;
  display:flex;align-items:center;justify-content:center;font-size:26px;
  border:1px solid rgba(201,168,76,0.22);background:rgba(201,168,76,0.06);
}
.venue-meta{flex:1;min-width:0;}
.venue-meta h1{font-size:18px;font-weight:700;color:var(--cream);line-height:1.3;margin-bottom:5px;}
.badges{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:5px;}
.badge{font-size:10px;font-weight:600;letter-spacing:.05em;padding:2px 9px;border-radius:10px;}
.badge-icoc{background:rgba(201,168,76,0.15);color:var(--gold);border:1px solid rgba(201,168,76,0.28);}
.badge-type{background:rgba(255,255,255,0.06);color:rgba(245,240,232,0.65);border:1px solid rgba(255,255,255,0.1);}
.venue-addr{font-size:12px;color:rgba(245,240,232,0.45);}

/* stats */
.stats-row{display:flex;gap:0;border-bottom:1px solid rgba(201,168,76,0.1);}
.stat-item{flex:1;text-align:center;padding:12px 0;border-right:1px solid rgba(201,168,76,0.08);}
.stat-item:last-child{border-right:none;}
.stat-val{font-size:15px;font-weight:700;color:var(--gold);font-family:'Playfair Display',serif;}
.stat-lbl{font-size:10px;color:rgba(245,240,232,0.4);margin-top:2px;letter-spacing:.04em;}

/* sports tags */
.sports-section{padding:12px 0 10px;}
.sports-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(245,240,232,0.35);margin-bottom:10px;}
.sports-tags{display:flex;flex-wrap:wrap;gap:6px;}
.sport-tag{
  display:flex;align-items:center;gap:5px;padding:5px 11px;
  border:1px solid rgba(201,168,76,0.18);border-radius:20px;
  font-size:12px;color:var(--cream);background:rgba(255,255,255,0.03);
  cursor:pointer;transition:all .2s;text-decoration:none;
}
.sport-tag:hover{border-color:var(--gold);background:rgba(201,168,76,0.1);color:var(--gold-l);}

/* action buttons */
.action-row{display:flex;gap:8px;padding-top:10px;padding-bottom:4px;flex-shrink:0;}
.btn-play{
  flex:2;display:flex;align-items:center;justify-content:center;gap:7px;
  padding:13px;background:linear-gradient(135deg,var(--gold),var(--gold-l));
  border:none;border-radius:12px;font-size:13px;font-weight:700;
  color:var(--navy);cursor:pointer;text-decoration:none;
  transition:all .2s;font-family:'Noto Sans KR',sans-serif;
  box-shadow:0 4px 16px rgba(201,168,76,0.28);
}
.btn-play:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(201,168,76,0.4);}
.btn-route{
  flex:1;display:flex;align-items:center;justify-content:center;gap:5px;
  padding:13px;border:1px solid rgba(201,168,76,0.28);border-radius:12px;
  background:rgba(201,168,76,0.05);font-size:13px;font-weight:600;
  color:var(--gold-l);cursor:pointer;text-decoration:none;
  transition:all .2s;font-family:'Noto Sans KR',sans-serif;
}
.btn-route:hover{background:rgba(201,168,76,0.14);border-color:var(--gold);}

/* collapsed */
.bottom-sheet.collapsed{transform:translateY(calc(100% - 72px));}

/* venue pulse marker */
.my-venue-marker{
  width:50px;height:50px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:22px;
  border:3px solid var(--gold);
  box-shadow:0 0 0 6px rgba(201,168,76,0.22),0 4px 16px rgba(0,0,0,0.5);
  animation:vpulse 2.2s ease-in-out infinite;
}
@keyframes vpulse{
  0%,100%{box-shadow:0 0 0 6px rgba(201,168,76,0.22),0 4px 16px rgba(0,0,0,0.5);}
  50%{box-shadow:0 0 0 14px rgba(201,168,76,0.06),0 4px 16px rgba(0,0,0,0.5);}
}

/* ── CHAT BUTTON (floating, bottom-right) ── */
.chat-fab{
  position:fixed;right:14px;bottom:calc(52vh + 80px);
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--gold-l));
  border:none;cursor:pointer;z-index:200;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 18px rgba(201,168,76,0.45);
  transition:all .25s;font-size:22px;
}
.chat-fab:hover{transform:scale(1.1);box-shadow:0 6px 24px rgba(201,168,76,0.6);}
.chat-dot{
  position:absolute;top:2px;right:2px;
  width:14px;height:14px;border-radius:50%;
  background:#4ade80;border:2px solid var(--navy);
  animation:chatdot 2s infinite;
}
@keyframes chatdot{0%,100%{opacity:1;}50%{opacity:.4;}}

/* chat modal */
.chat-modal{
  position:fixed;right:16px;z-index:300;
  width:320px;max-height:420px;
  background:var(--glass2);border:1px solid rgba(201,168,76,0.25);
  border-radius:18px;backdrop-filter:blur(24px);
  box-shadow:0 16px 48px rgba(0,0,0,0.5);
  display:none;flex-direction:column;overflow:hidden;
}
.chat-modal.open{display:flex;}
.chat-header{
  display:flex;align-items:center;gap:10px;
  padding:14px 16px;border-bottom:1px solid rgba(201,168,76,0.12);
}
.chat-header-icon{font-size:20px;}
.chat-header-text{flex:1;}
.chat-header-text h3{font-size:14px;font-weight:700;color:var(--cream);}
.chat-header-text p{font-size:11px;color:rgba(245,240,232,0.45);}
.chat-close{background:none;border:none;color:rgba(245,240,232,0.4);font-size:18px;cursor:pointer;padding:4px;}
.chat-close:hover{color:var(--cream);}
.chat-messages{flex:1;overflow-y:auto;padding:14px 14px 8px;display:flex;flex-direction:column;gap:10px;min-height:160px;}
.chat-msg{font-size:12px;line-height:1.5;}
.chat-msg.system{color:rgba(245,240,232,0.4);text-align:center;font-size:11px;}
.chat-msg .bubble{
  display:inline-block;padding:8px 12px;border-radius:12px;max-width:80%;
  background:rgba(201,168,76,0.1);color:var(--cream);border:1px solid rgba(201,168,76,0.15);
}
.chat-coming-soon{
  padding:20px 16px;text-align:center;
  color:rgba(245,240,232,0.45);font-size:12px;line-height:1.8;
}
.chat-coming-soon .icon{font-size:32px;display:block;margin-bottom:8px;}
.chat-coming-soon strong{color:var(--gold);display:block;margin-bottom:4px;}
.chat-input-row{
  display:flex;gap:8px;padding:10px 12px;
  border-top:1px solid rgba(201,168,76,0.1);
}
.chat-input{
  flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(201,168,76,0.2);
  border-radius:20px;padding:8px 14px;font-size:12px;
  color:var(--cream);outline:none;font-family:'Noto Sans KR',sans-serif;
}
.chat-input::placeholder{color:rgba(245,240,232,0.25);}
.chat-send{
  background:var(--gold);border:none;border-radius:50%;
  width:34px;height:34px;cursor:pointer;font-size:14px;
  transition:all .2s;flex-shrink:0;
}
.chat-send:hover{background:var(--gold-l);}

/* desktop sidebar */
@media(min-width:640px){
  .bottom-sheet{left:auto;right:0;top:56px;bottom:0;width:380px;transform:none !important;border-top:none;border-left:1px solid rgba(201,168,76,0.15);}
  .sheet-handle-area{display:none;}
  .sheet-scroll{max-height:calc(100vh - 210px);}
  .float-btns{right:396px;}
  .chat-fab{right:396px;bottom:24px;}
  .chat-modal{right:396px;bottom:88px;}
}

/* ── 슬라이드쇼 ── */
/* 슬라이드쇼: PC에서만 표시 */
@media(max-width:767px){ .venue-slides-wrap{ display:none !important; } }
.venue-slides-wrap{position:relative;height:90px;border-radius:10px;overflow:hidden;margin:8px 0 6px;}
.venue-slide{position:absolute;inset:0;opacity:0;transition:opacity 0.7s;}
.venue-slide.vs-active{opacity:1;}
.venue-slide img{width:100%;height:100%;object-fit:cover;filter:brightness(.65);}
/* ── 연령대 채팅 ── */
.age-chat-wrap{margin:8px 0 12px;}
.age-chat-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(245,240,232,0.38);margin-bottom:7px;}
.age-chat-btns{display:flex;gap:5px;}
.age-chat-btn{flex:1;padding:7px 2px;border:1px solid rgba(201,168,76,0.22);border-radius:10px;background:rgba(201,168,76,0.06);color:rgba(245,240,232,0.75);font-size:11px;font-weight:600;cursor:pointer;transition:all .18s;font-family:inherit;}
.age-chat-btn:hover{background:rgba(201,168,76,0.18);border-color:var(--gold);color:var(--gold-l);}
</style>
</head>
<body>

<div id="map"></div>

<!-- TOP BAR -->
<div class="top-bar">
  <a href="index.html" class="btn-back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    목록
  </a>
  <div class="top-venue-name" id="top-name">경기장</div>
  <div class="top-type-badge" id="top-type">ICOC</div>
</div>

<!-- FLOATING BUTTONS -->
<div class="float-btns">
  <button class="float-btn" id="btn-3d" title="3D/평면 전환">🧭</button>
  <a href="index.html" class="float-btn" title="홈" style="text-decoration:none;font-size:16px;">🏠</a>
</div>

<!-- CHAT FAB -->
<button class="chat-fab" id="chat-fab" title="경기장 채팅">
  💬
  <div class="chat-dot"></div>
</button>

<!-- CHAT MODAL -->
<div class="chat-modal" id="chat-modal">
  <div class="chat-header">
    <div class="chat-header-icon">💬</div>
    <div class="chat-header-text">
      <h3 id="chat-venue-name">경기장 채팅</h3>
      <p>이 경기장 유저들과 소통하세요</p>
    </div>
    <button class="chat-close" id="chat-close">✕</button>
  </div>
  <div class="chat-messages" id="chat-messages">
    <div class="chat-coming-soon">
      <span class="icon">🔔</span>
      <strong>채팅 기능 준비 중</strong>
      경기장 채팅은 곧 오픈됩니다!<br>
      오목·체스 대결 신청, 정모 약속,<br>
      국가대표 팀 빌딩까지 가능해져요.
    </div>
  </div>
  <div class="chat-input-row">
    <input class="chat-input" placeholder="메시지 입력 (준비 중)..." disabled>
    <button class="chat-send" disabled>➤</button>
  </div>
</div>

<!-- BOTTOM SHEET -->
<div class="bottom-sheet" id="bottom-sheet">
  <div class="sheet-handle-area" id="sheet-handle"><div class="sheet-handle"></div></div>
  <div class="sheet-body">
    <div class="sheet-scroll">

      <div class="venue-header">
        <div class="venue-icon-box" id="v-icon">🏢</div>
        <div class="venue-meta">
          <h1 id="v-name">경기장</h1>
          <div class="badges">
            <span class="badge badge-icoc">✦ ICOC 2027 공식</span>
            <span class="badge badge-type" id="v-type-badge">종목</span>
          </div>
          <div class="venue-addr" id="v-addr">주소</div>
        </div>
      </div>

      <div class="stats-row">
        <div class="stat-item"><div class="stat-val" id="v-rank">#1</div><div class="stat-lbl">지역 랭킹</div></div>
        <div class="stat-item"><div class="stat-val" id="v-players">—</div><div class="stat-lbl">등록 선수</div></div>
        <div class="stat-item"><div class="stat-val" id="v-matches">—</div><div class="stat-lbl">이번 달 매치</div></div>
        <div class="stat-item"><div class="stat-val" id="v-rating">★ 4.8</div><div class="stat-lbl">평점</div></div>
      </div>

      <div class="sports-section">
        <div class="sports-title">🎮 플레이 가능 종목</div>
        <div class="sports-tags" id="v-sports-tags"></div>
      </div>

      <!-- 경기장 분위기 슬라이드쇼 -->
      <div class="venue-slides-wrap" id="venue-slides-wrap">
        <div class="venue-slide vs-active"><img src="assets/hero-bg.jpg" alt=""></div>
        <div class="venue-slide"><img src="assets/hero-slide-1.jpg" alt=""></div>
        <div class="venue-slide"><img src="assets/hero-slide-2.jpg" alt=""></div>
        <div class="venue-slide"><img src="assets/hero-slide-3.jpg" alt=""></div>
        <div class="venue-slide"><img src="assets/hero-slide-4.jpg" alt=""></div>
      </div>

      <!-- 연령대별 채팅방 버튼 -->
      <div class="age-chat-wrap">
        <div class="age-chat-label">💬 연령대별 채팅방</div>
        <div class="age-chat-btns">
          <button class="age-chat-btn" onclick="openAgeChat('10대')">🧒 10대</button>
          <button class="age-chat-btn" onclick="openAgeChat('20대')">🧑 20대</button>
          <button class="age-chat-btn" onclick="openAgeChat('30대')">👨 30대</button>
          <button class="age-chat-btn" onclick="openAgeChat('40대')">🧔 40대</button>
          <button class="age-chat-btn" onclick="openAgeChat('50대')">👴 50대</button>
          <button class="age-chat-btn" onclick="openAgeChat('60대+')">👵 60대+</button>
        </div>
      </div>
    </div>

    <div class="action-row">
      <a class="btn-play" id="btn-games" href="games.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        온라인으로 지금 플레이
      </a>
      <a class="btn-route" id="btn-route" href="#" target="_blank">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="10" r="3"/><path d="M12 2a8 8 0 0 1 8 8c0 5.25-8 14-8 14S4 15.25 4 10a8 8 0 0 1 8-8z"/></svg>
        길찾기
      </a>
    </div>
  </div>
</div>

<script src="js/points.js"></script>
<script>
const p = new URLSearchParams(location.search);
const VENUE = {
  id:   p.get('id')   || '1',
  name: p.get('name') || '경기장',
  type: p.get('type') || 'board',
  lat:  parseFloat(p.get('lat'))  || 37.5665,
  lng:  parseFloat(p.get('lng'))  || 126.9780,
  addr: p.get('addr') || '주소 정보 없음',
  city: p.get('city') || '',
};

const TYPES = {
  go:         { label:'기원',       icon:'⚫', color:'#2d6b2d', sports:['바둑'] },
  billiards:  { label:'당구장',     icon:'🎱', color:'#1a4a7a', sports:['당구(3구)','당구(4구)','스누커'] },
  bowling:    { label:'볼링장',     icon:'🎳', color:'#7a3a1a', sports:['볼링'] },
  screengolf: { label:'스크린골프', icon:'⛳', color:'#2a7a2a', sports:['스크린골프','파크골프'] },
  board:      { label:'보드카페',   icon:'🎯', color:'#5a1a7a', sports:['오목','체스','장기','체커','루미큐브','할리갈리','스플렌더','카탄','헥스','쿼리도'] },
  parkgolf:   { label:'파크골프',   icon:'🌿', color:'#3a7a1a', sports:['파크골프','필드골프'] },
  chess:      { label:'체스클럽',   icon:'♟️', color:'#7a6a1a', sports:['체스','장기','바둑','오목'] },
  holdem:     { label:'홀덤펍',     icon:'🃏', color:'#7a1a1a', sports:['홀덤','진러미','블랙잭','브릿지'] },
  pcbang:     { label:'PC방',       icon:'🖥️', color:'#1a3a7a', sports:['체스','오목','다빈치코드','커넥트4','리버시'] },
};
const T = TYPES[VENUE.type] || { label:VENUE.type, icon:'📍', color:'#4a4a6a', sports:[] };
const rnd = (a,b) => Math.floor(Math.random()*(b-a+1))+a;

// Fill DOM
document.title = `${VENUE.name} — ICOC 2027`;
document.getElementById('top-name').textContent = VENUE.name;
document.getElementById('top-type').textContent = T.label;
document.getElementById('v-icon').textContent = T.icon;
document.getElementById('v-icon').style.cssText += `;background:${T.color}22;border-color:${T.color}55`;
document.getElementById('v-name').textContent = VENUE.name;
document.getElementById('v-type-badge').textContent = T.label;
document.getElementById('v-addr').textContent = '📍 ' + VENUE.addr + (VENUE.city ? '  ·  ' + VENUE.city : '');
document.getElementById('v-rank').textContent = '#' + rnd(1,30);
document.getElementById('v-players').textContent = rnd(12,280);
document.getElementById('v-matches').textContent = rnd(40,310);
document.getElementById('v-rating').textContent = '★ ' + (3.8+Math.random()*1.2).toFixed(1);
document.getElementById('chat-venue-name').textContent = VENUE.name + ' 채팅';
document.getElementById('btn-route').href = `https://map.kakao.com/?q=${encodeURIComponent(VENUE.name)}`;
document.getElementById('btn-games').href = `games.html?type=${VENUE.type}`;

// Sports tags
const tagsEl = document.getElementById('v-sports-tags');
T.sports.forEach(s => {
  const a = document.createElement('a');
  a.href = `games.html?game=${encodeURIComponent(s)}`;
  a.className = 'sport-tag';
  a.innerHTML = `🎮 ${s}`;
  tagsEl.appendChild(a);
});

// ── MAP ──
const MAPBOX_TOKEN = 'pk.eyJ1IjoibWlsaXZlcnNlMTAwNCIsImEiOiJjbXF0NmltcjYwMWprMnpzaGFrdjF5YnA3In0.yqIA5e6OePYT65r-xZShLA';
let is3d = true;

// Try Mapbox first, fallback to MapLibre
let map;
if (window.mapboxgl) {
  mapboxgl.accessToken = MAPBOX_TOKEN;
  map = new mapboxgl.Map({
    container:'map', style:'mapbox://styles/mapbox/dark-v11',
    center:[VENUE.lng, VENUE.lat], zoom:16, pitch:55, bearing:-15, antialias:true,
  });
  map.addControl(new mapboxgl.NavigationControl({visualizePitch:true}),'top-left');
  map.on('load', addVenueMarker);
} else {
  map = new maplibregl.Map({
    container:'map',
    style:'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
    center:[VENUE.lng, VENUE.lat], zoom:16, pitch:55, bearing:-15, antialias:true,
  });
  map.addControl(new maplibregl.NavigationControl({visualizePitch:true}),'top-left');
  map.on('load', addVenueMarker);
}

function addVenueMarker() {
  const el = document.createElement('div');
  el.className = 'my-venue-marker';
  el.style.background = T.color + 'cc';
  el.textContent = T.icon;
  const Lib = window.mapboxgl || window.maplibregl;
  new Lib.Marker({element:el, anchor:'bottom'})
    .setLngLat([VENUE.lng, VENUE.lat])
    .addTo(map);
}

// 3D toggle
document.getElementById('btn-3d').addEventListener('click', () => {
  is3d = !is3d;
  map.easeTo({pitch: is3d?55:0, bearing: is3d?-15:0, duration:800});
  document.getElementById('btn-3d').textContent = is3d ? '🧭' : '🗺️';
});

// Bottom sheet collapse (mobile)
const sheet = document.getElementById('bottom-sheet');
let collapsed = false;
document.getElementById('sheet-handle').addEventListener('click', () => {
  collapsed = !collapsed;
  sheet.classList.toggle('collapsed', collapsed);
});
map.on('click', () => { if(!collapsed){collapsed=true;sheet.classList.add('collapsed');} });

// Chat toggle
const chatFab  = document.getElementById('chat-fab');
const chatModal = document.getElementById('chat-modal');
chatFab.addEventListener('click', () => chatModal.classList.toggle('open'));
document.getElementById('chat-close').addEventListener('click', () => chatModal.classList.remove('open'));

// ── 슬라이드쇼: PC에서만 (768px 이상) ──
(function(){
  if(window.innerWidth < 768) return;
  const slides = document.querySelectorAll('.venue-slide');
  if(!slides.length) return;
  let cur = 0;
  setInterval(()=>{
    slides[cur].classList.remove('vs-active');
    cur = (cur+1) % slides.length;
    slides[cur].classList.add('vs-active');
  }, 2000);
})();

function openAgeChat(age) {
  const modal = document.getElementById('chat-modal');
  if(!modal) return;
  document.getElementById('chat-venue-name').textContent = VENUE.name + ' · ' + age + ' 채팅방';
  const msgs = document.getElementById('chat-messages');
  if(msgs) msgs.innerHTML = '<div class="chat-coming-soon"><span class="icon">💬</span><strong style="color:var(--gold);display:block;margin-bottom:6px;">' + age + ' 전용 채팅방</strong>같은 연령대 ICOC 플레이어들과<br>경기 신청 · 정모 약속 · 팀 빌딩!<br><br><span style="color:rgba(245,240,232,0.4);font-size:11px;">🔔 곧 오픈 예정입니다</span></div>';
  modal.classList.add('open');
}

</script>
</body>
</html>
