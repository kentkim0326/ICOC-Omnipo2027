<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICOC 경기장 — Brain Sports Omnipo 2027</title>
<link rel="icon" href="assets/favicon-32.png" type="image/png" sizes="32x32">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<!-- Mapbox GL JS (primary) -->
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<!-- MapLibre GL JS (fallback) -->
<link href="https://cdn.jsdelivr.net/npm/maplibre-gl@4/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/maplibre-gl@4/dist/maplibre-gl.js"></script>
<style>
:root {
  --navy:#0B1F3A; --navy2:#0e2847; --gold:#C9A84C; --gold-l:#E8C97A;
  --cream:#F5F0E8; --glass:rgba(11,31,58,0.88); --glass2:rgba(10,26,52,0.97);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Noto Sans KR',sans-serif;background:var(--navy);}

/* ── MAP ── */
#map{position:fixed;inset:0;width:100vw;height:100vh;z-index:0;}

/* ── TOP BAR ── */
.top-bar{
  position:fixed;top:0;left:0;right:0;height:56px;
  display:flex;align-items:center;gap:10px;padding:0 16px;
  background:var(--glass);backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(201,168,76,0.18);z-index:100;
}
.btn-back{
  display:flex;align-items:center;gap:5px;padding:6px 14px;
  border:1px solid rgba(201,168,76,0.3);border-radius:24px;
  background:rgba(201,168,76,0.07);color:var(--gold-l);
  font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;
  transition:all .2s;white-space:nowrap;
}
.btn-back:hover{background:rgba(201,168,76,0.16);border-color:var(--gold);}
.top-venue-name{flex:1;min-width:0;font-size:15px;font-weight:700;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.top-type-badge{font-size:11px;font-weight:600;color:var(--gold);padding:3px 10px;border:1px solid rgba(201,168,76,0.28);border-radius:12px;white-space:nowrap;}

/* ── FLOATING BUTTONS (right side) ── */
.float-btns{
  position:fixed;right:14px;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;gap:10px;z-index:90;
}
.float-btn{
  width:44px;height:44px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:var(--glass);border:1px solid rgba(201,168,76,0.28);
  cursor:pointer;font-size:18px;backdrop-filter:blur(12px);
  transition:all .2s;color:var(--cream);
}
.float-btn:hover{background:rgba(201,168,76,0.18);border-color:var(--gold);}

/* ── BOTTOM SHEET ── */
.bottom-sheet{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  transition:transform .4s cubic-bezier(.32,.72,0,1);
  max-height:40vh; /* sheet 전체 최대 높이 */
  display:flex;flex-direction:column;
}
.sheet-handle-area{
  width:100%;display:flex;justify-content:center;
  padding:8px 0 0;cursor:pointer;flex-shrink:0;
}
.sheet-handle{width:36px;height:4px;background:rgba(201,168,76,0.35);border-radius:2px;}
.sheet-body{
  background:var(--glass2);backdrop-filter:blur(24px);
  border-top:1px solid rgba(201,168,76,0.2);
  padding:0 16px 10px;
  display:flex;flex-direction:column;flex:1;overflow:hidden;
}
/* 스크롤 영역 - 최대 높이 제한 */
.sheet-scroll{
  overflow-y:auto;flex:1;
  max-height:calc(40vh - 100px); /* action-row 높이 제외 */
}
.sheet-scroll::-webkit-scrollbar{width:3px;}
.sheet-scroll::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.25);border-radius:2px;}

/* 모바일: 더 작게 */
@media(max-width:640px){
  .bottom-sheet{ max-height:38vh; }
  .sheet-scroll{ max-height:calc(38vh - 90px); }
}
/* 접힌 상태 */
.bottom-sheet.collapsed .sheet-scroll{ max-height:0;overflow:hidden; }
.bottom-sheet.collapsed .sheet-expand-hint{ display:block; }
.sheet-expand-hint{ display:none;text-align:center;font-size:11px;color:rgba(201,168,76,0.5);padding:4px 0 8px; }

/* venue header */
.venue-header{
  display:flex;align-items:center;gap:12px;
  padding:10px 0 10px;border-bottom:1px solid rgba(201,168,76,0.1);
}
.venue-icon-box{
  width:52px;height:52px;flex-shrink:0;border-radius:14px;
  display:flex;align-items:center;justify-content:center;font-size:26px;
  border:1px solid rgba(201,168,76,0.22);background:rgba(201,168,76,0.06);
}
.venue-meta{flex:1;min-width:0;}
.venue-meta h1{font-size:18px;font-weight:700;color:var(--cream);line-height:1.3;margin-bottom:5px;}
.badges{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:5px;}
.badge{font-size:10px;font-weight:600;letter-spacing:.05em;padding:2px 9px;border-radius:10px;}
.badge-icoc{background:rgba(201,168,76,0.15);color:var(--gold);border:1px solid rgba(201,168,76,0.28);}
.badge-type{background:rgba(255,255,255,0.06);color:rgba(245,240,232,0.65);border:1px solid rgba(255,255,255,0.1);}
.venue-addr{font-size:12px;color:rgba(245,240,232,0.45);}

/* stats */
.stats-row{display:flex;gap:0;border-bottom:1px solid rgba(201,168,76,0.1);}
.stat-item{flex:1;text-align:center;padding:12px 0;border-right:1px solid rgba(201,168,76,0.08);}
.stat-item:last-child{border-right:none;}
.stat-val{font-size:15px;font-weight:700;color:var(--gold);font-family:'Playfair Display',serif;}
.stat-lbl{font-size:10px;color:rgba(245,240,232,0.4);margin-top:2px;letter-spacing:.04em;}

/* sports tags */
.sports-section{padding:12px 0 10px;}
.sports-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(245,240,232,0.35);margin-bottom:10px;}
.sports-tags{display:flex;flex-wrap:wrap;gap:6px;}
.sport-tag{
  display:flex;align-items:center;gap:5px;padding:5px 11px;
  border:1px solid rgba(201,168,76,0.18);border-radius:20px;
  font-size:12px;color:var(--cream);background:rgba(255,255,255,0.03);
  cursor:pointer;transition:all .2s;text-decoration:none;
}
.sport-tag:hover{border-color:var(--gold);background:rgba(201,168,76,0.1);color:var(--gold-l);}

/* action buttons */
.action-row{display:flex;gap:8px;padding-top:10px;padding-bottom:4px;flex-shrink:0;}
.btn-play{
  flex:2;display:flex;align-items:center;justify-content:center;gap:7px;
  padding:13px;background:linear-gradient(135deg,var(--gold),var(--gold-l));
  border:none;border-radius:12px;font-size:13px;font-weight:700;
  color:var(--navy);cursor:pointer;text-decoration:none;
  transition:all .2s;font-family:'Noto Sans KR',sans-serif;
  box-shadow:0 4px 16px rgba(201,168,76,0.28);
}
.btn-play:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(201,168,76,0.4);}
.btn-route{
  flex:1;display:flex;align-items:center;justify-content:center;gap:5px;
  padding:13px;border:1px solid rgba(201,168,76,0.28);border-radius:12px;
  background:rgba(201,168,76,0.05);font-size:13px;font-weight:600;
  color:var(--gold-l);cursor:pointer;text-decoration:none;
  transition:all .2s;font-family:'Noto Sans KR',sans-serif;
}
.btn-route:hover{background:rgba(201,168,76,0.14);border-color:var(--gold);}

/* collapsed */
.bottom-sheet.collapsed{transform:translateY(calc(100% - 72px));}

/* venue pulse marker */
.my-venue-marker{
  width:50px;height:50px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:22px;
  border:3px solid var(--gold);
  box-shadow:0 0 0 6px rgba(201,168,76,0.22),0 4px 16px rgba(0,0,0,0.5);
  animation:vpulse 2.2s ease-in-out infinite;
}
@keyframes vpulse{
  0%,100%{box-shadow:0 0 0 6px rgba(201,168,76,0.22),0 4px 16px rgba(0,0,0,0.5);}
  50%{box-shadow:0 0 0 14px rgba(201,168,76,0.06),0 4px 16px rgba(0,0,0,0.5);}
}

/* ── CHAT BUTTON (floating, bottom-right) ── */
.chat-fab{
  position:fixed;right:14px;bottom:calc(52vh + 80px);
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--gold-l));
  border:none;cursor:pointer;z-index:200;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 18px rgba(201,168,76,0.45);
  transition:all .25s;font-size:22px;
}
.chat-fab:hover{transform:scale(1.1);box-shadow:0 6px 24px rgba(201,168,76,0.6);}
.chat-dot{
  position:absolute;top:2px;right:2px;
  width:14px;height:14px;border-radius:50%;
  background:#4ade80;border:2px solid var(--navy);
  animation:chatdot 2s infinite;
}
@keyframes chatdot{0%,100%{opacity:1;}50%{opacity:.4;}}

/* chat modal */
.chat-modal{
  position:fixed;right:16px;z-index:300;
  width:320px;max-height:420px;
  background:var(--glass2);border:1px solid rgba(201,168,76,0.25);
  border-radius:18px;backdrop-filter:blur(24px);
  box-shadow:0 16px 48px rgba(0,0,0,0.5);
  display:none;flex-direction:column;overflow:hidden;
}
.chat-modal.open{display:flex;}
.chat-header{
  display:flex;align-items:center;gap:10px;
  padding:14px 16px;border-bottom:1px solid rgba(201,168,76,0.12);
}
.chat-header-icon{font-size:20px;}
.chat-header-text{flex:1;}
.chat-header-text h3{font-size:14px;font-weight:700;color:var(--cream);}
.chat-header-text p{font-size:11px;color:rgba(245,240,232,0.45);}
.chat-close{background:none;border:none;color:rgba(245,240,232,0.4);font-size:18px;cursor:pointer;padding:4px;}
.chat-close:hover{color:var(--cream);}
.chat-messages{flex:1;overflow-y:auto;padding:14px 14px 8px;display:flex;flex-direction:column;gap:10px;min-height:160px;}
.chat-msg{font-size:12px;line-height:1.5;}
.chat-msg.system{color:rgba(245,240,232,0.4);text-align:center;font-size:11px;}
.chat-msg .bubble{
  display:inline-block;padding:8px 12px;border-radius:12px;max-width:80%;
  background:rgba(201,168,76,0.1);color:var(--cream);border:1px solid rgba(201,168,76,0.15);
}
.chat-coming-soon{
  padding:20px 16px;text-align:center;
  color:rgba(245,240,232,0.45);font-size:12px;line-height:1.8;
}
.chat-coming-soon .icon{font-size:32px;display:block;margin-bottom:8px;}
.chat-coming-soon strong{color:var(--gold);display:block;margin-bottom:4px;}
.chat-input-row{
  display:flex;gap:8px;padding:10px 12px;
  border-top:1px solid rgba(201,168,76,0.1);
}
.chat-input{
  flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(201,168,76,0.2);
  border-radius:20px;padding:8px 14px;font-size:12px;
  color:var(--cream);outline:none;font-family:'Noto Sans KR',sans-serif;
}
.chat-input::placeholder{color:rgba(245,240,232,0.25);}
.chat-send{
  background:var(--gold);border:none;border-radius:50%;
  width:34px;height:34px;cursor:pointer;font-size:14px;
  transition:all .2s;flex-shrink:0;
}
.chat-send:hover{background:var(--gold-l);}

/* desktop sidebar */
@media(min-width:640px){
  .bottom-sheet{left:auto;right:0;top:56px;bottom:0;width:380px;transform:none !important;border-top:none;border-left:1px solid rgba(201,168,76,0.15);}
  .sheet-handle-area{display:none;}
  .sheet-scroll{max-height:calc(100vh - 210px);}
  .float-btns{right:396px;}
  .chat-fab{right:396px;bottom:24px;}
  .chat-modal{right:396px;bottom:88px;}
}

/* ── 슬라이드쇼 ── */
/* 슬라이드쇼: PC에서만 표시 */
@media(max-width:767px){ .venue-slides-wrap{ display:none !important; } }
.venue-slides-wrap{position:relative;height:90px;border-radius:10px;overflow:hidden;margin:8px 0 6px;}
.venue-slide{position:absolute;inset:0;opacity:0;transition:opacity 0.7s;}
.venue-slide.vs-active{opacity:1;}
.venue-slide img{width:100%;height:100%;object-fit:cover;filter:brightness(.65);}
/* ── 연령대 채팅 ── */
.age-chat-wrap{margin:8px 0 12px;}
.age-chat-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(245,240,232,0.38);margin-bottom:7px;}
.age-chat-btns{display:flex;gap:5px;}
.age-chat-btn{flex:1;padding:7px 2px;border:1px solid rgba(201,168,76,0.22);border-radius:10px;background:rgba(201,168,76,0.06);color:rgba(245,240,232,0.75);font-size:11px;font-weight:600;cursor:pointer;transition:all .18s;font-family:inherit;}
.age-chat-btn:hover{background:rgba(201,168,76,0.18);border-color:var(--gold);color:var(--gold-l);}

/* ── NEW TOP-BAR ACTIONS ── */
.top-bar {
  position:fixed; top:0; left:0; right:0; z-index:300;
  display:flex; align-items:center; gap:8px;
  padding:0 10px; height:52px;
  background:rgba(8,20,44,0.96); backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(201,168,76,0.15);
}
.top-bar-actions {
  display:flex; align-items:center; gap:5px;
  margin-left:auto; flex-shrink:0;
}
.map-style-pills {
  display:flex; gap:3px; align-items:center;
}
.style-pill {
  width:28px; height:28px; border-radius:8px;
  background:rgba(201,168,76,0.06); border:1px solid rgba(201,168,76,0.2);
  color:#E8C97A; font-size:13px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all .15s;
}
.style-pill:hover, .style-pill.active {
  background:rgba(201,168,76,0.18); border-color:rgba(201,168,76,0.5);
}
.tb-btn {
  display:flex; align-items:center; gap:4px;
  padding:5px 9px; border-radius:16px;
  background:rgba(201,168,76,0.07); border:1px solid rgba(201,168,76,0.22);
  color:#E8C97A; font-size:12px; font-weight:600;
  cursor:pointer; font-family:inherit; text-decoration:none;
  white-space:nowrap; transition:all .15s;
}
.tb-btn:hover { background:rgba(201,168,76,0.16); }
.tb-play-btn { background:rgba(74,222,128,0.08); border-color:rgba(74,222,128,0.25); color:#4ade80; }
.tb-play-btn:hover { background:rgba(74,222,128,0.18); }
.tb-chat-wrap { position:relative; }
.tb-chat-dropdown {
  display:none; position:absolute; top:calc(100% + 6px); right:0;
  background:rgba(8,20,44,0.97); border:1px solid rgba(201,168,76,0.25);
  border-radius:12px; padding:10px 8px; min-width:130px; z-index:400;
  backdrop-filter:blur(20px); box-shadow:0 8px 32px rgba(0,0,0,0.5);
}
.tb-chat-dropdown.open { display:block; }
.tb-chat-dropdown button {
  display:block; width:100%; padding:7px 10px; text-align:left;
  background:none; border:none; color:rgba(245,240,232,0.75);
  font-size:12px; font-weight:500; cursor:pointer; border-radius:8px;
  font-family:inherit; transition:background .15s;
}
.tb-chat-dropdown button:hover { background:rgba(201,168,76,0.12); color:#E8C97A; }
.tb-label { display:inline; }
@media(max-width:400px) { .tb-label { display:none; } }

/* ── MAP fills full screen ── */
html,body{height:100%;margin:0;overflow:hidden;}
#map{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;}
.bottom-sheet { z-index:200; }
.mapboxgl-ctrl-top-left { top:56px !important; }
.maplibregl-ctrl-top-left { top:56px !important; }


@keyframes tickerScroll {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
@keyframes tickerFade {
  0%,100% { opacity:0.6; }
  50%      { opacity:1; }
}

</style>
</head>
<body>

<div id="map"></div>

<!-- TOP BAR -->
<div class="top-bar" id="top-bar">
  <a href="index.html" class="btn-back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    목록
  </a>
  <div class="top-venue-name" id="top-name">경기장</div>
  <div class="top-bar-actions">
    <!-- 지도 스타일 -->
    <div class="map-style-pills" id="map-style-pills">
      <button class="style-pill active" onclick="changeVenueStyle('dark')">🌑</button>
      <button class="style-pill" onclick="changeVenueStyle('light')">☀️</button>
      <button class="style-pill" onclick="changeVenueStyle('streets')">🏙️</button>
      <button class="style-pill" onclick="changeVenueStyle('outdoor')">🌿</button>
      <button class="style-pill" onclick="toggle3D()" id="btn-3d-top" title="3D 전환">🏢</button>
    </div>
    <!-- 채팅 토글 -->
    <div class="tb-chat-wrap" id="tb-chat-wrap">
      <button class="tb-btn tb-chat-btn" id="tb-chat-btn" onclick="toggleChatPanel()">
        💬 <span class="tb-label">채팅</span>
      </button>
      <div class="tb-chat-dropdown" id="tb-chat-dropdown">
        <div style="font-size:11px;color:rgba(245,240,232,0.5);padding:4px 0 6px;font-weight:600;">연령대별 채팅방</div>
        <button onclick="openAgeChat('10대');toggleChatPanel()">🧒 10대</button>
        <button onclick="openAgeChat('20대');toggleChatPanel()">🧑 20대</button>
        <button onclick="openAgeChat('30대');toggleChatPanel()">👨 30대</button>
        <button onclick="openAgeChat('40대');toggleChatPanel()">🧔 40대</button>
        <button onclick="openAgeChat('50대');toggleChatPanel()">👴 50대</button>
        <button onclick="openAgeChat('60대');toggleChatPanel()">👵 60대</button>
        <button onclick="openAgeChat('70대+');toggleChatPanel()">🧓 70대+</button>
      </div>
    </div>
    <!-- 경기장 등록 -->
    <button class="tb-btn tb-reg-btn" id="tb-reg-btn" onclick="openVenueRegModal()" style="display:none;">
      📍 <span class="tb-label">등록</span>
    </button>
    <!-- 게임하기 -->
    <a href="games.html" class="tb-btn tb-play-btn">
      🎮 <span class="tb-label">게임</span>
    </a>
  </div>
</div>





<!-- CHAT MODAL -->
<div class="chat-modal" id="chat-modal" style="display:none;">
  <div class="chat-header">
    <div class="chat-header-icon">💬</div>
    <div class="chat-header-text">
      <h3 id="chat-venue-name">경기장 채팅</h3>
      <p>이 경기장 유저들과 소통하세요</p>
    </div>
    <button class="chat-close" id="chat-close" onclick="closeAgeChat()">✕</button>
  </div>
  <div class="chat-messages" id="chat-messages">
    <div class="chat-coming-soon">
      <span class="icon">🔔</span>
      <strong>채팅 기능 준비 중</strong>
      경기장 채팅은 곧 오픈됩니다!<br>
      오목·체스 대결 신청, 정모 약속,<br>
      국가대표 팀 빌딩까지 가능해져요.
    </div>
  </div>
  <div class="chat-input-row">
    <input class="chat-input" placeholder="메시지 입력 (준비 중)..." disabled>
    <button class="chat-send" disabled>➤</button>
  </div>
</div>

<!-- BOTTOM SHEET -->


<div class="bottom-sheet" id="bottom-sheet">
  <div class="sheet-handle-area" id="sheet-handle"><div class="sheet-handle"></div></div>
  <div class="sheet-body">
    <div class="sheet-scroll">

      <div class="venue-header">
        <div class="venue-icon-box" id="v-icon">🏢</div>
        <div class="venue-meta">
          <h1 id="v-name">경기장</h1>
          <div class="badges">
            <span class="badge badge-icoc">✦ ICOC 2027 공식</span>
            <span class="badge badge-type" id="v-type-badge">종목</span>
          </div>
          <div class="venue-addr" id="v-addr">주소</div>
        </div>
      </div>

      <div class="stats-row">
        <div class="stat-item"><div class="stat-val" id="v-rank">#1</div><div class="stat-lbl">지역 랭킹</div></div>

</div>

<script src="js/points.js"></script>
<script>
const p = new URLSearchParams(location.search);
const VENUE = {
  id:   p.get('id')   || '1',
  name: p.get('name') || '경기장',
  type: p.get('type') || 'board',
  lat:  parseFloat(p.get('lat'))  || 37.5665,
  lng:  parseFloat(p.get('lng'))  || 126.9780,
  addr: p.get('addr') || '주소 정보 없음',
  city: p.get('city') || '',
};
const TYPES = {
  go:         { label:'기원',       icon:'⚫', color:'#2d6b2d', sports:['바둑','오목'] },
  billiards:  { label:'당구장',     icon:'🎱', color:'#1a4a7a', sports:['당구(3구)','당구(4구)','스누커','포켓볼'] },
  bowling:    { label:'볼링장',     icon:'🎳', color:'#7a3a1a', sports:['볼링'] },
  screengolf: { label:'스크린골프', icon:'⛳', color:'#2a7a2a', sports:['스크린골프','파크골프'] },
  board:      { label:'보드카페',   icon:'🎯', color:'#5a1a7a', sports:['오목','체스','장기','체커','루미큐브','블로커스'] },
  chess:      { label:'체스클럽',   icon:'♟️', color:'#7a6a1a', sports:['체스','장기','바둑','오목'] },
  holdem:     { label:'홀덤펍',     icon:'🃏', color:'#7a1a1a', sports:['홀덤','진러미','블랙잭','브릿지','마작'] },
  mahjong:    { label:'마작클럽',   icon:'🀄', color:'#8a1a1a', sports:['마작','홀덤','블랙잭'] },
  pcbang:     { label:'PC방',       icon:'🖥️', color:'#1a3a7a', sports:['체스','오목','다빈치코드','스피드큐브'] },
};
const T = TYPES[VENUE.type] || { label:VENUE.type||'보드카페', icon:'📍', color:'#4a4a6a', sports:[] };
const rnd = (a,b) => Math.floor(Math.random()*(b-a+1))+a;

const MAPBOX_TOKEN = 'pk.eyJ1IjoibWlsaXZlcnNlMTAwNCIsImEiOiJjbXF0NmltcjYwMWprMnpzaGFrdjF5YnA3In0.yqIA5e6OePYT65r-xZShLA';
var map;
var is3d = true;

// ── DOM 채우기 ──
document.title = VENUE.name + ' — ICOC 2027';
const _tn = document.getElementById('top-name');    if(_tn) _tn.textContent = VENUE.name;
const _tt = document.getElementById('top-type');    if(_tt) _tt.textContent = T.label;
const _vi = document.getElementById('v-icon');      if(_vi) { _vi.textContent = T.icon; _vi.style.cssText += ';background:' + T.color + '22;border-color:' + T.color + ';'; }
const _vn = document.getElementById('v-name');      if(_vn) _vn.textContent = VENUE.name;
const _vt = document.getElementById('v-type-badge');if(_vt) _vt.textContent = T.label;
const _va = document.getElementById('v-addr');      if(_va) _va.textContent = '📍 ' + VENUE.addr + (VENUE.city ? '  ·  ' + VENUE.city : '');
const _vr = document.getElementById('v-rank');      if(_vr) _vr.textContent = '#' + rnd(1,30);
const _vp = document.getElementById('v-players');   if(_vp) _vp.textContent = rnd(12,280);
const _vm = document.getElementById('v-matches');   if(_vm) _vm.textContent = rnd(40,310);
const _vg = document.getElementById('v-rating');    if(_vg) _vg.textContent = '★ ' + (3.8+Math.random()*1.2).toFixed(1);
const _vcn = document.getElementById('chat-venue-name'); if(_vcn) _vcn.textContent = VENUE.name + ' 채팅';

// Sports tags
const tagsEl = document.getElementById('v-sports-tags');
if(tagsEl) T.sports.forEach(function(s) {
  const a = document.createElement('a');
  a.href = 'games.html?game=' + encodeURIComponent(s);
  a.className = 'sport-tag'; a.textContent = s;
  tagsEl.appendChild(a);
});

// ── 전역 함수들 (onclick에서 직접 호출) ──

function changeVenueStyle(style) {
  if (!map) return;

  // ── Mapbox 스타일 (Mapbox GL JS 사용 시) ──
  const mapboxStyles = {
    dark:    'mapbox://styles/mapbox/dark-v11',
    light:   'mapbox://styles/mapbox/light-v11',
    streets: 'mapbox://styles/mapbox/streets-v12',
    outdoor: 'mapbox://styles/mapbox/outdoors-v12',
  };
  // ── MapLibre 폴백 스타일 (Mapbox 없을 때) ──
  const mlStyles = {
    dark:    'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
    light:   'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
    streets: 'https://basemaps.cartocdn.com/gl/voyager-gl-style/style.json',
    outdoor: 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
  };

  // active 버튼 표시
  document.querySelectorAll('.style-pill').forEach(function(b) { b.classList.remove('active'); });
  const order = ['dark','light','streets','outdoor'];
  const pills = document.querySelectorAll('.style-pill');
  const idx = order.indexOf(style);
  if (pills[idx]) pills[idx].classList.add('active');

  // 스타일 적용
  const newStyle = window.mapboxgl
    ? (mapboxStyles[style] || mapboxStyles.dark)
    : (mlStyles[style] || mlStyles.dark);

  try {
    map.setStyle(newStyle);
    // 스타일 로드 후 3D건물 + 한글 레이블 재적용
    map.once('style.load', function() {
      add3DBuildings();
      applyKoreanLabels();
    });
  } catch(e) { console.warn('Style change error', e); }
}

// ── 3D 건물 레이어 추가 (별도 함수) ──
function add3DBuildings() {
  if (!window.mapboxgl || !map.getSource('composite')) return;
  try {
    if (map.getLayer('3d-buildings')) map.removeLayer('3d-buildings');
    map.addLayer({
      id: '3d-buildings',
      source: 'composite',
      'source-layer': 'building',
      filter: ['==', 'extrude', 'true'],
      type: 'fill-extrusion',
      minzoom: 14,
      paint: {
        'fill-extrusion-color': [
          'interpolate', ['linear'], ['get', 'height'],
          0, '#C9A84C', 50, '#E8C97A', 100, '#F5F0E8'
        ],
        'fill-extrusion-height': [
          'interpolate', ['linear'], ['zoom'],
          14, 0, 14.5, ['get', 'height']
        ],
        'fill-extrusion-base': [
          'interpolate', ['linear'], ['zoom'],
          14, 0, 14.5, ['get', 'min_height']
        ],
        'fill-extrusion-opacity': 0.75
      }
    });
  } catch(e) { console.warn('3D buildings:', e); }
}

// ── 한글 레이블 적용 (별도 함수) ──
function applyKoreanLabels() {
  try {
    map.getStyle().layers.forEach(function(layer) {
      if (layer.layout && layer.layout['text-field']) {
        map.setLayoutProperty(layer.id, 'text-field', [
          'coalesce', ['get', 'name_ko'], ['get', 'name:ko'], ['get', 'name']
        ]);
      }
    });
  } catch(e) {}
}

function toggle3D() {
  if (!map) return;
  const btn = document.getElementById('btn-3d-top');
  try {
    const pitch = map.getPitch();
    if (pitch < 30) {
      map.easeTo({ pitch:60, bearing:-20, duration:800 });
      if(btn) { btn.textContent = '2D'; btn.title = '2D 전환'; }
    } else {
      map.easeTo({ pitch:0, bearing:0, duration:600 });
      if(btn) { btn.textContent = '🏢'; btn.title = '3D 전환'; }
    }
  } catch(e) {}
}

function toggleChatPanel() {
  const dd = document.getElementById('tb-chat-dropdown');
  if(dd) dd.classList.toggle('open');
}

function closeAgeChat() {
  const modal = document.getElementById('chat-modal');
  if(modal) modal.style.display = 'none';
  const dd = document.getElementById('tb-chat-dropdown');
  if(dd) dd.classList.add('open');
}

function openAgeChat(age) {
  const modal = document.getElementById('chat-modal');
  if(!modal) return;
  modal.style.display = 'flex';
  const sub = modal.querySelector('.chat-header-text p');
  if(sub) sub.innerHTML = '<button onclick="closeAgeChat()" style="background:none;border:none;color:#C9A84C;font-size:12px;cursor:pointer;font-family:inherit;padding:0;">← 연령대 선택</button>';
  const nameEl = document.getElementById('chat-venue-name');
  if(nameEl) nameEl.textContent = VENUE.name + ' · ' + age + ' 채팅방';
  const msgs = document.getElementById('chat-messages');
  if(msgs) msgs.innerHTML = '<div class="chat-coming-soon"><span class="icon">💬</span><strong style="color:var(--gold);display:block;margin-bottom:8px;">' + age + ' 채팅방</strong>이 경기장의 ' + age + ' 유저들과 대전 신청, 정모, 팀 빌딩 등을 나눠보세요.<br><br>채팅 기능 오픈 준비 중...</div>';
  modal.classList.add('open');
}

function checkShowVenueRegBtn() {
  const btn = document.getElementById('tb-reg-btn');
  if(!btn) return;
  const loggedIn = !!(window.ICOC_AUTH && ICOC_AUTH.getCurrentUser && ICOC_AUTH.getCurrentUser());
  btn.style.display = loggedIn ? 'flex' : 'none';
}

// ── 날씨 티커 ──
function showWeatherTicker() {
  if(document.getElementById('venue-weather-ticker')) return;
  const ticker = document.createElement('div');
  ticker.id = 'venue-weather-ticker';
  ticker.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:150;background:rgba(8,20,44,0.92);backdrop-filter:blur(10px);border-top:1px solid rgba(201,168,76,0.15);height:28px;overflow:hidden;display:flex;align-items:center;';
  ticker.innerHTML = '<div style="flex-shrink:0;padding:0 8px;"><span style="font-size:9px;font-weight:700;color:#C9A84C;">🌤 날씨</span></div><div style="flex:1;overflow:hidden;"><div id="venue-weather-text" style="display:inline-block;font-size:11px;color:rgba(245,240,232,0.7);white-space:nowrap;animation:tickerScroll 35s linear infinite;padding:0 10px;line-height:28px;">날씨 불러오는 중...</div></div>';
  document.body.appendChild(ticker);
  const cities = [{name:'서울',lat:37.5665,lng:126.9780},{name:'도쿄',lat:35.6762,lng:139.6503},{name:'뉴욕',lat:40.7128,lng:-74.0060},{name:'런던',lat:51.5074,lng:-0.1278},{name:'베이징',lat:39.9042,lng:116.4074},{name:'시드니',lat:-33.8688,lng:151.2093}];
  const WMO = {0:'맑음',1:'대체로맑음',2:'흐릿',3:'흐림',45:'안개',61:'비',71:'눈',80:'소나기',95:'뇌우'};
  Promise.all(cities.map(function(c) {
    return fetch('https://api.open-meteo.com/v1/forecast?latitude=' + c.lat + '&longitude=' + c.lng + '&current_weather=true')
      .then(function(r){return r.json();})
      .then(function(d){return {name:c.name,temp:Math.round(d.current_weather.temperature),code:d.current_weather.weathercode};})
      .catch(function(){return {name:c.name,temp:'?',code:0};});
  })).then(function(results) {
    const text = results.map(function(r){return '🌍 ' + r.name + ' ' + r.temp + '°C ' + (WMO[r.code]||'');}).join(' · ');
    const el = document.getElementById('venue-weather-text');
    if(el) el.textContent = text + ' · ' + text;
  });
}


function showNewsTicker() {
  if(document.getElementById('venue-news-ticker')) return;
  const ticker = document.createElement('div');
  ticker.id = 'venue-news-ticker';
  ticker.style.cssText = 'position:fixed;bottom:28px;left:0;right:0;z-index:149;background:rgba(201,168,76,0.08);backdrop-filter:blur(8px);border-top:1px solid rgba(201,168,76,0.1);height:22px;overflow:hidden;display:flex;align-items:center;';
  ticker.innerHTML = '<div style="flex-shrink:0;padding:0 8px;font-size:9px;font-weight:700;color:#C9A84C;white-space:nowrap;">📰 뉴스</div><div style="flex:1;overflow:hidden;"><div id="venue-news-text" style="display:inline-block;font-size:10px;color:rgba(245,240,232,0.6);white-space:nowrap;animation:tickerScroll 50s linear infinite;padding:0 10px;line-height:22px;">뉴스 로딩 중...</div></div>';
  document.body.appendChild(ticker);

  // RSS2JSON (무료 CORS 프록시)
  const RSS_URL = encodeURIComponent('https://news.google.com/rss/search?q=브레인스포츠+바둑+체스&hl=ko&gl=KR&ceid=KR:ko');
  fetch('https://api.rss2json.com/v1/api.json?rss_url=' + RSS_URL + '&count=10')
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.items && d.items.length) {
        const text = d.items.map(function(item){ return '📌 ' + item.title; }).join('　　·　　');
        const el = document.getElementById('venue-news-text');
        if(el) el.textContent = text + '　　·　　' + text;
      }
    })
    .catch(function(){
      const el = document.getElementById('venue-news-text');
      if(el) el.textContent = '📌 ICOC Brain Sports Omnipo 2027 오픈　·　195개국 온라인 두뇌스포츠 플랫폼　·　바둑·체스·장기·당구·볼링 온라인 대전　·　지금 국가대표에 도전하세요';
    });
}

// ── 마커 추가 ──
function addVenueMarker() {
  const el = document.createElement('div');
  el.className = 'my-venue-marker';
  el.style.cssText = 'width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;border:3px solid rgba(201,168,76,0.8);box-shadow:0 4px 16px rgba(0,0,0,0.5);cursor:pointer;background:' + T.color + 'cc;';
  el.textContent = T.icon;
  const Lib = window.mapboxgl || window.maplibregl;
  if(!Lib) return;
  new Lib.Marker({element:el, anchor:'bottom'})
    .setLngLat([VENUE.lng, VENUE.lat])
    .addTo(map);

  // 한글 레이블 + 3D 건물 (공통 함수 사용)
  applyKoreanLabels();
  add3DBuildings();

  showWeatherTicker();
  showNewsTicker();
  checkShowVenueRegBtn();
}

// ── 지도 초기화 ──
function initVenueMap() {
  const container = document.getElementById('map');
  if(!container || container.offsetWidth === 0) {
    setTimeout(initVenueMap, 150);
    return;
  }
  if(window.mapboxgl) {
    mapboxgl.accessToken = MAPBOX_TOKEN;
    map = new mapboxgl.Map({
      container:'map', style:'mapbox://styles/mapbox/standard',
      center:[VENUE.lng, VENUE.lat], zoom:16, pitch:55, bearing:-15, antialias:true,
      language: 'ko',
    });
    // Standard 스타일 다크모드
    map.on('style.load', function() {
      try {
        map.setConfigProperty('basemap', 'lightPreset', 'night');
        map.setConfigProperty('basemap', 'showPointOfInterestLabels', true);
        map.setConfigProperty('basemap', 'showRoadLabels', true);
      } catch(e) {}
    });
    map.addControl(new mapboxgl.NavigationControl({visualizePitch:true}), 'top-left');
    map.on('load', addVenueMarker);
    map.on('error', function(e){ console.warn('Mapbox error:', e.error); });
  } else if(window.maplibregl) {
    map = new maplibregl.Map({
      container:'map',
      style:'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
      center:[VENUE.lng, VENUE.lat], zoom:16, pitch:55, bearing:-15,
    });
    map.addControl(new maplibregl.NavigationControl(), 'top-left');
    map.on('load', addVenueMarker);
  } else {
    console.warn('No map library loaded');
  }
}

// ── 이벤트 바인딩 (DOMContentLoaded 후) ──
document.addEventListener('DOMContentLoaded', function() {
  initVenueMap();
  // Bottom sheet
  const sheet = document.getElementById('bottom-sheet');
  const handle = document.getElementById('sheet-handle');
  let collapsed = false;
  if(handle) handle.addEventListener('click', function() {
    collapsed = !collapsed;
    if(sheet) sheet.classList.toggle('collapsed', collapsed);
  });
  // Chat close
  const chatClose = document.getElementById('chat-close');
  if(chatClose) chatClose.addEventListener('click', closeAgeChat);
  // 외부 클릭 시 채팅 드롭다운 닫기
  document.addEventListener('click', function(e) {
    if(!e.target.closest('#tb-chat-wrap')) {
      const dd = document.getElementById('tb-chat-dropdown');
      if(dd) dd.classList.remove('open');
    }
  });
  setTimeout(checkShowVenueRegBtn, 1500);
  setInterval(checkShowVenueRegBtn, 5000);
});
</script>
