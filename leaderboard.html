<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>리더보드 — ICOC Brain Sports Omnipo 2027</title>
<link rel="icon" href="assets/favicon-32.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{ --navy:#0B1F3A; --navy2:#0e2847; --gold:#C9A84C; --gold-l:#E8C97A; --cream:#F5F0E8; --border:rgba(201,168,76,0.2); }
*{ margin:0; padding:0; box-sizing:border-box; }
html{ scroll-behavior:smooth; }
body{ background:var(--navy); color:var(--cream); font-family:'Noto Sans KR',sans-serif; min-height:100vh; }

.top-bar{
  position:sticky; top:0; z-index:100;
  display:flex; align-items:center; gap:10px; padding:0 16px; height:56px;
  background:rgba(11,31,58,0.96); backdrop-filter:blur(18px);
  border-bottom:1px solid var(--border);
}
.btn-back{
  display:flex; align-items:center; gap:5px; padding:6px 14px;
  border:1px solid rgba(201,168,76,0.28); border-radius:24px;
  background:rgba(201,168,76,0.06); color:var(--gold-l);
  font-size:13px; font-weight:500; cursor:pointer; text-decoration:none; transition:all .2s;
}
.btn-back:hover{ background:rgba(201,168,76,0.16); border-color:var(--gold); }
.bar-title{ flex:1; font-size:15px; font-weight:700; color:var(--cream); }
.live-badge{
  display:flex; align-items:center; gap:5px; font-size:11px;
  color:rgba(245,240,232,0.5); padding:4px 10px;
  border:1px solid rgba(201,168,76,0.15); border-radius:10px;
}
.live-dot{ width:7px; height:7px; border-radius:50%; background:#4ade80; animation:blink 1.5s infinite; }
@keyframes blink{ 0%,100%{opacity:1;} 50%{opacity:.3;} }

/* HERO */
.hero-strip{
  padding:24px 16px 0;
  background:linear-gradient(180deg,rgba(201,168,76,0.07) 0%,transparent 100%);
}
.hero-strip h1{ font-family:'Playfair Display',serif; font-size:clamp(20px,5vw,30px); font-weight:900; color:var(--gold); margin-bottom:3px; }
.hero-strip p{ font-size:12px; color:rgba(245,240,232,0.45); margin-bottom:14px; }

/* SCOPE TABS */
.scope-tabs{
  display:flex; gap:0; border-bottom:1px solid var(--border);
  background:rgba(11,31,58,0.96); backdrop-filter:blur(12px);
  position:sticky; top:56px; z-index:90; padding:0 16px; overflow-x:auto;
}
.scope-tabs::-webkit-scrollbar{ display:none; }
.scope-tab{
  padding:12px 18px; font-size:13px; font-weight:600;
  color:rgba(245,240,232,0.45); cursor:pointer;
  border-bottom:2px solid transparent; transition:all .2s;
  white-space:nowrap; background:none; border-top:none; border-left:none; border-right:none;
  font-family:inherit;
}
.scope-tab:hover{ color:var(--gold-l); }
.scope-tab.active{ color:var(--gold); border-bottom-color:var(--gold); }

/* SPORT FILTER - 66 sports */
.sport-filter-wrap{
  background:rgba(10,26,52,0.8); border-bottom:1px solid rgba(201,168,76,0.1);
  position:sticky; top:107px; z-index:89;
}
.sport-filter-header{
  display:flex; align-items:center; gap:8px; padding:8px 16px 0;
}
.sport-cat-tabs{ display:flex; gap:6px; flex-wrap:nowrap; overflow-x:auto; }
.sport-cat-tabs::-webkit-scrollbar{ display:none; }
.sport-cat-tab{
  padding:5px 12px; border:1px solid rgba(201,168,76,0.2); border-radius:16px;
  background:transparent; color:rgba(245,240,232,0.55);
  font-size:11px; font-weight:600; cursor:pointer; white-space:nowrap; font-family:inherit;
  transition:all .2s;
}
.sport-cat-tab:hover{ border-color:var(--gold); color:var(--gold-l); }
.sport-cat-tab.active{ background:var(--gold); color:var(--navy); border-color:var(--gold); }

.sport-pills{
  display:flex; gap:5px; flex-wrap:nowrap; overflow-x:auto;
  padding:8px 16px 10px; scroll-behavior:smooth;
}
.sport-pills::-webkit-scrollbar{ height:3px; }
.sport-pills::-webkit-scrollbar-thumb{ background:rgba(201,168,76,0.25); border-radius:2px; }
.sport-pill{
  padding:5px 12px; border:1px solid rgba(201,168,76,0.18); border-radius:16px;
  background:transparent; color:rgba(245,240,232,0.6);
  font-size:11px; font-weight:500; cursor:pointer; white-space:nowrap; font-family:inherit;
  transition:all .2s; flex-shrink:0;
}
.sport-pill:hover{ border-color:var(--gold); color:var(--gold-l); }
.sport-pill.active{ background:rgba(201,168,76,0.15); color:var(--gold); border-color:rgba(201,168,76,0.4); font-weight:700; }

/* MAIN CONTENT */
.lb-wrap{ padding:0 16px 80px; max-width:860px; margin:0 auto; }

/* MY RANK */
.my-rank-card{
  margin:14px 0 10px;
  background:rgba(201,168,76,0.09); border:1px solid rgba(201,168,76,0.32);
  border-radius:14px; padding:13px 14px;
  display:flex; align-items:center; gap:12px;
}
.my-rank-num{ font-family:'Playfair Display',serif; font-size:24px; font-weight:900; color:var(--gold); min-width:46px; text-align:center; }
.my-rank-info{ flex:1; min-width:0; }
.my-rank-info h3{ font-size:13px; font-weight:700; color:var(--cream); margin-bottom:2px; }
.my-rank-info p{ font-size:11px; color:rgba(245,240,232,0.4); }
.my-rank-pts{ font-family:'Playfair Display',serif; font-size:18px; font-weight:900; color:var(--gold); text-align:right; }
.my-rank-pts span{ display:block; font-size:10px; color:rgba(245,240,232,0.35); font-family:'Noto Sans KR',sans-serif; font-weight:400; }

/* SECTION LABEL */
.lb-sec{ font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:rgba(245,240,232,0.32); padding:14px 0 8px; display:flex; align-items:center; gap:8px; }
.lb-sec::after{ content:''; flex:1; height:1px; background:rgba(201,168,76,0.1); }

/* PODIUM */
.podium{ display:flex; align-items:flex-end; justify-content:center; gap:8px; padding:16px 0 20px; }
.p-item{ display:flex; flex-direction:column; align-items:center; gap:6px; flex:1; max-width:110px; text-align:center; }
.p-avatar{ width:52px; height:52px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:26px; border:2px solid rgba(201,168,76,0.3); background:rgba(14,40,71,0.8); }
.p-item.r1 .p-avatar{ width:64px; height:64px; font-size:30px; border-color:var(--gold); box-shadow:0 0 18px rgba(201,168,76,0.3); }
.p-item.r2 .p-avatar{ border-color:#C0C0C0; }
.p-item.r3 .p-avatar{ border-color:#CD7F32; }
.p-nick{ font-size:12px; font-weight:700; color:var(--cream); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; width:100%; }
.p-pts{ font-family:'Playfair Display',serif; font-size:14px; font-weight:900; color:var(--gold); }
.p-badge{ width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:900; }
.r1 .p-badge{ background:var(--gold); color:var(--navy); width:26px; height:26px; font-size:13px; }
.r2 .p-badge{ background:#C0C0C0; color:#111; }
.r3 .p-badge{ background:#CD7F32; color:#fff; }
.p-base{ background:rgba(14,40,71,0.7); border:1px solid var(--border); border-bottom:none; border-radius:6px 6px 0 0; width:100%; padding:6px 4px 0; }
.r1 .p-base{ background:rgba(201,168,76,0.1); border-color:rgba(201,168,76,0.22); height:52px; }
.r2 .p-base{ height:36px; }
.r3 .p-base{ height:24px; }

/* RANK LIST */
.rank-list{ display:flex; flex-direction:column; gap:4px; }
.rank-item{
  display:flex; align-items:center; gap:10px; padding:11px 12px;
  border-radius:11px; background:rgba(14,40,71,0.5); border:1px solid rgba(201,168,76,0.07);
  transition:all .18s; cursor:default;
}
.rank-item:hover{ background:rgba(14,40,71,0.85); border-color:rgba(201,168,76,0.18); }
.rank-item.me{ background:rgba(201,168,76,0.07); border-color:rgba(201,168,76,0.25); }
.r-num{ font-family:'Playfair Display',serif; font-size:15px; font-weight:700; color:rgba(245,240,232,0.28); min-width:26px; text-align:center; }
.rank-item:nth-child(1) .r-num{ color:var(--gold); }
.rank-item:nth-child(2) .r-num{ color:#C0C0C0; }
.rank-item:nth-child(3) .r-num{ color:#CD7F32; }
.r-flag{ font-size:22px; flex-shrink:0; }
.r-info{ flex:1; min-width:0; }
.r-nick{ font-size:13px; font-weight:700; color:var(--cream); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.r-sub{ font-size:11px; color:rgba(245,240,232,0.38); margin-top:1px; display:flex; gap:6px; flex-wrap:wrap; }
.r-tag{ background:rgba(201,168,76,0.1); color:var(--gold); border-radius:6px; padding:1px 6px; font-size:10px; }
.r-chg{ font-size:11px; min-width:24px; text-align:center; }
.up{ color:#4ade80; } .dn{ color:#f87171; } .eq{ color:rgba(245,240,232,0.2); }
.r-pts{ font-family:'Playfair Display',serif; font-size:15px; font-weight:700; color:var(--gold); text-align:right; white-space:nowrap; }
.r-pts small{ font-size:10px; color:rgba(245,240,232,0.3); font-family:'Noto Sans KR',sans-serif; font-weight:400; display:block; }

/* COUNTRY ITEM */
.country-item{
  display:flex; align-items:center; gap:10px; padding:11px 12px;
  border-radius:11px; background:rgba(14,40,71,0.5); border:1px solid rgba(201,168,76,0.07);
  transition:all .18s; margin-bottom:4px; cursor:pointer;
}
.country-item:hover{ background:rgba(14,40,71,0.85); border-color:rgba(201,168,76,0.2); }
.country-item.expanded{ border-color:rgba(201,168,76,0.3); background:rgba(14,40,71,0.8); }
.c-rank{ font-family:'Playfair Display',serif; font-size:15px; font-weight:700; color:rgba(245,240,232,0.28); min-width:26px; text-align:center; }
.c-flag{ font-size:30px; flex-shrink:0; }
.c-info{ flex:1; min-width:0; }
.c-name{ font-size:14px; font-weight:700; color:var(--cream); margin-bottom:2px; }
.c-sub{ font-size:11px; color:rgba(245,240,232,0.4); display:flex; gap:10px; flex-wrap:wrap; }
.c-bar-wrap{ width:70px; }
.c-bar-bg{ height:4px; background:rgba(255,255,255,0.07); border-radius:2px; margin-bottom:2px; }
.c-bar{ height:4px; background:var(--gold); border-radius:2px; transition:width .5s; }
.c-pts{ font-family:'Playfair Display',serif; font-size:15px; font-weight:700; color:var(--gold); text-align:right; white-space:nowrap; }

/* Expanded detail */
.c-detail{
  display:none; padding:10px 12px 12px;
  background:rgba(10,26,52,0.5); border-top:1px solid rgba(201,168,76,0.1);
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:8px;
}
.c-detail.open{ display:grid; }
.c-sport-stat{
  background:rgba(14,40,71,0.7); border:1px solid rgba(201,168,76,0.12);
  border-radius:8px; padding:8px 10px;
}
.c-sport-stat .sport-name{ font-size:11px; font-weight:700; color:var(--cream); margin-bottom:3px; }
.c-sport-stat .sport-data{ font-size:10px; color:rgba(245,240,232,0.45); }
.c-city-list{ margin-top:8px; display:flex; flex-wrap:wrap; gap:5px; }
.c-city-tag{ font-size:10px; background:rgba(201,168,76,0.08); color:var(--gold); border:1px solid rgba(201,168,76,0.2); border-radius:6px; padding:2px 8px; }

.page-end{ height:40px; }
</style>
</head>

</div>

<div class="lb-wrap" id="lb-wrap"></div>

/* ── State ── */
let curScope = 'country';
let curSport = 'all';
let curCat   = 'all';

function fmtPts(n){
  if(n>=1e6) return (n/1e6).toFixed(1)+'M';
  if(n>=1e3) return (n/1e3).toFixed(0)+'K';
  return n.toLocaleString();
}
function chgIcon(c){ return c==='up'?'<span class="up">↑</span>':c==='dn'?'<span class="dn">↓</span>':'<span class="eq">—</span>'; }

/* ── Sport Pills ── */
function buildSportPills(cat){
  const pills = document.getElementById('sport-pills');
  pills.innerHTML = '';
  const list = cat==='all'? ALL_SPORTS : ALL_SPORTS.filter(s=>s.cat===cat);
  
  // All button
  const allBtn = document.createElement('button');
  allBtn.className = 'sport-pill'+(curSport==='all'?' active':'');
  allBtn.textContent = '전체';
  allBtn.onclick = () => selectSport('all', allBtn);
  pills.appendChild(allBtn);
  
  list.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'sport-pill'+(curSport===s.id?' active':'');
    btn.innerHTML = `${s.icon} ${s.name}`;
    btn.onclick = () => selectSport(s.id, btn);
    pills.appendChild(btn);
  });
}

function filterCat(cat, el){
  curCat = cat;
  document.querySelectorAll('.sport-cat-tab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  curSport = 'all';
  buildSportPills(cat);
  render();
}

function selectSport(id, el){
  curSport = id;
  document.querySelectorAll('.sport-pill').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function setScope(scope, btn){
  curScope = scope;
  document.querySelectorAll('.scope-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

/* ── Render ── */
function render(){
  const wrap = document.getElementById('lb-wrap');
  wrap.innerHTML = '';
  
  // My rank card
  const myPts = window.ICOC_POINTS ? ICOC_POINTS.getState().total : 0;
  wrap.innerHTML += `
    <div class="my-rank-card">
      <div class="my-rank-num">#${Math.floor(Math.random()*50)+10}</div>
      <div class="my-rank-info">
        <h3>나의 현재 순위 <span style="font-size:10px;color:rgba(245,240,232,0.4);">(${curScope==='country'?'국가별':curScope==='city'?'도시별':curScope==='district'?'동네별':'개인'}${curSport!=='all'?' · '+( ALL_SPORTS.find(s=>s.id===curSport)?.name||''):''})</span></h3>
        <p>🇰🇷 대한민국 · 서울</p>
      </div>
      <div class="my-rank-pts">${fmtPts(myPts)}<span>내 포인트</span></div>
    </div>`;

  if(curScope==='country') renderCountry(wrap);
  else if(curScope==='city') renderCity(wrap);
  else if(curScope==='district') renderDistrict(wrap);
  else renderPersonal(wrap);
}

function renderCountry(wrap){
  const top3 = COUNTRIES.slice(0,3);
  
  // Podium
  wrap.innerHTML += `<div class="lb-sec">🥇 TOP 3 국가</div>`;
  const maxP = COUNTRIES[0].pts;
  const pod = document.createElement('div');
  pod.className = 'podium';
  [top3[1],top3[0],top3[2]].forEach((d,i)=>{
    const ri=i===1?1:(i===0?2:3);
    pod.innerHTML+=`
      <div class="p-item r${ri}">
        <div class="p-badge">${ri}</div>
        <div class="p-avatar" style="padding:4px;">${
      d.iso
      ? `<img src="https://flagcdn.com/w80/${d.iso}.png" style="width:${ri===1?'52px':'42px'};height:${ri===1?'36px':'28px'};object-fit:cover;border-radius:4px;" alt="${d.name}">`
      : `<span style="font-size:${ri===1?'36px':'28px'}">${d.flag}</span>`
    }</div>
        <div class="p-nick">${d.name}</div>
        <div style="font-size:11px;color:rgba(245,240,232,0.45);">${d.players.toLocaleString()}명</div>
        <div class="p-pts">${fmtPts(d.pts)}</div>
        <div class="p-base"></div>
      </div>`;
  });
  wrap.appendChild(pod);

  wrap.innerHTML += `<div class="lb-sec">🌐 전체 국가 랭킹 <span style="font-size:10px;color:var(--gold);margin-left:4px;">클릭시 상세 보기</span></div>`;
  
  COUNTRIES.forEach(d=>{
    const pct=Math.round(d.pts/maxP*100);
    const sportName = curSport!=='all' ? ALL_SPORTS.find(s=>s.id===curSport)?.name : '';
    const sportPts  = curSport!=='all' && d.sports?.[curSport] ? d.sports[curSport] : null;
    
    const item = document.createElement('div');
    item.className = 'country-item';
    item.dataset.id = d.rank;
    item.innerHTML = `
      <div class="c-rank">${d.rank}</div>
      <div class="c-flag">${d.iso?`<img src="https://flagcdn.com/w40/${d.iso}.png" style="width:36px;height:24px;object-fit:cover;border-radius:3px;" alt="${d.name}">`:d.flag}</div>
      <div class="c-info">
        <div class="c-name">${d.name} <span style="font-size:11px;color:rgba(245,240,232,0.35);">${d.en}</span></div>
        <div class="c-sub">
          <span>👥 ${d.players.toLocaleString()}명</span>
          ${sportPts?`<span class="r-tag">${sportName} ${sportPts}명</span>`:''}
          <span>${chgIcon(d.change)}</span>
        </div>
      </div>
      <div class="c-bar-wrap">
        <div class="c-bar-bg"><div class="c-bar" style="width:${pct}%"></div></div>
      </div>
      <div class="c-pts">${fmtPts(d.pts)}<small>pts</small></div>`;
    
    // Detail panel
    const detail = document.createElement('div');
    detail.className = 'c-detail';
    detail.style.cssText = 'display:none;padding:10px 12px 12px;border-top:1px solid rgba(201,168,76,0.1);background:rgba(10,26,52,0.5);';
    
    // Sport breakdown
    const topSports = Object.entries(d.sports||{}).sort(([,a],[,b])=>b-a).slice(0,6);
    let detailHtml = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px;margin-bottom:8px;">';
    topSports.forEach(([sid,cnt])=>{
      const sp = ALL_SPORTS.find(s=>s.id===sid);
      detailHtml += `<div style="background:rgba(14,40,71,0.7);border:1px solid rgba(201,168,76,0.12);border-radius:8px;padding:7px 9px;">
        <div style="font-size:11px;font-weight:700;color:var(--cream);margin-bottom:2px;">${sp?.icon||''} ${sp?.name||sid}</div>
        <div style="font-size:10px;color:rgba(245,240,232,0.45);">👥 ${cnt}명 참여</div>
      </div>`;
    });
    detailHtml += '</div>';
    // Cities
    if(d.cities?.length){
      detailHtml += '<div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;">';
      d.cities.forEach(c => { detailHtml += `<span style="font-size:10px;background:rgba(201,168,76,0.08);color:var(--gold);border:1px solid rgba(201,168,76,0.2);border-radius:6px;padding:2px 8px;">🏙 ${c}</span>`; });
      detailHtml += '</div>';
    }
    detail.innerHTML = detailHtml;
    
    const wrapper = document.createElement('div');
    wrapper.style.cssText = 'border-radius:11px;overflow:hidden;margin-bottom:4px;border:1px solid rgba(201,168,76,0.07);';
    wrapper.appendChild(item);
    wrapper.appendChild(detail);
    
    item.addEventListener('click',()=>{
      const open = detail.style.display==='block';
      detail.style.display = open?'none':'block';
      item.style.borderColor = open?'':'rgba(201,168,76,0.3)';
    });
    wrap.appendChild(wrapper);
  });
}

function renderCity(wrap){
  wrap.innerHTML += `<div class="lb-sec">🏙 33대 도시 랭킹 <span style="font-size:10px;color:var(--gold);margin-left:4px;">클릭시 동네 보기</span></div>`;

    li.className='rank-item'; li.style.cursor='pointer';
    li.innerHTML=`
      <div class="r-num">${d.rank}</div>

      <div class="r-info">
        <div class="r-nick">${d.name}</div>
        <div class="r-sub"><span>${d.country}</span><span>👥 ${d.players.toLocaleString()}명</span></div>
      </div>
      <div class="r-chg">${chgIcon(d.change)}</div>
      <div class="r-pts">${fmtPts(d.pts)}<small>pts</small></div>`;
    
    const detail = document.createElement('div');
    detail.style.cssText='display:none;padding:8px 12px;background:rgba(10,26,52,0.6);border-top:1px solid rgba(201,168,76,0.1);';

  wrap.appendChild(list);

function renderPersonal(wrap){
  const top3=PERSONAL.slice(0,3), rest=PERSONAL.slice(3);
  wrap.innerHTML+=`<div class="lb-sec">👑 TOP 3 플레이어</div>`;
  const pod=document.createElement('div'); pod.className='podium';
  [top3[1],top3[0],top3[2]].forEach((d,i)=>{
    const ri=i===1?1:(i===0?2:3);
    pod.innerHTML+=`
      <div class="p-item r${ri}">
        <div class="p-badge">${ri}</div>
        <div class="p-avatar">${d.flag}</div>
        <div class="p-nick">${d.nick}</div>
        <div style="font-size:10px;color:rgba(245,240,232,0.4);">${d.sport}</div>
        <div class="p-pts">${fmtPts(d.pts)}</div>
        <div class="p-base"></div>
      </div>`;
  });
  wrap.appendChild(pod);
  
  wrap.innerHTML+=`<div class="lb-sec">🏅 개인 랭킹 4위 ~</div>`;
  const list=document.createElement('div'); list.className='rank-list';
  rest.forEach(d=>{
    list.innerHTML+=`
      <div class="rank-item">
        <div class="r-num">${d.rank}</div>
        <div class="r-flag">${d.iso?`<img src="https://flagcdn.com/w40/${d.iso}.png" style="width:28px;height:18px;object-fit:cover;border-radius:2px;" alt="">`:d.flag}</div>
        <div class="r-info">
          <div class="r-nick">${d.nick}</div>
          <div class="r-sub"><span>${d.city}</span><span class="r-tag">${d.sport}</span></div>
        </div>
        <div class="r-chg">${chgIcon(d.change)}</div>
        <div class="r-pts">${fmtPts(d.pts)}<small>pts</small></div>
      </div>`;
  });
  wrap.appendChild(list);
}

// Init
buildSportPills('all');
render();
</script>
</body>
